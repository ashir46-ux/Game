<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пульт Ведущего: Кто хочет стать миллионером?</title>
    <style>
        :root {
            --bg-main: #121218;
            --bg-panel: #1e1e2a;
            --bg-dark: #0a0a0f;
            --accent: #ffd700;
            --blue: #1f4068;
            --green: #2ecc71;
            --orange: #e67e22;
            --red: #e74c3c;
            --text: #ffffff;
            --text-muted: #8a8a93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Левая панель управления */
        .main-panel { flex: 1; display: flex; flex-direction: column; padding: 25px; justify-content: space-between; }
        .header { text-align: center; font-size: 20px; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
        
        .question-box { background-color: var(--bg-panel); padding: 20px; border-radius: 8px; font-size: 18px; font-weight: bold; min-height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; border-left: 5px solid var(--blue); }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .option { background-color: var(--bg-panel); padding: 15px; border-radius: 6px; font-size: 15px; font-weight: bold; border: 1px solid #2a2a3a; transition: all 0.3s ease; }
        .option.selected { background-color: var(--orange); border-color: var(--orange); }
        .option.correct { background-color: var(--green); border-color: var(--green); }
        .option.wrong { background-color: var(--red); border-color: var(--red); }
        .option.removed { color: #444455; background-color: #171722; }

        .monitor-label { font-size: 13px; font-style: italic; color: var(--text-muted); margin-bottom: 5px; }
        .log-box { background-color: var(--bg-dark); flex: 1; border-radius: 6px; padding: 15px; font-family: 'Courier New', monospace; font-size: 14px; color: #39ff14; overflow-y: auto; white-space: pre-line; line-height: 1.4; border: 1px solid #1a1a24; }

        .controls { display: flex; gap: 15px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: background 0.2s; }
        .btn-blue { background-color: var(--blue); }
        .btn-blue:hover { background-color: #285284; }
        .btn-green { background-color: #16a085; }
        .btn-green:hover { background-color: #1abc9c; }
        .btn:disabled { background-color: #2a2a35; color: #5a5a65; cursor: not-allowed; }

        /* Правая панель с суммами */
        .side-panel { width: 260px; background-color: var(--bg-dark); display: flex; flex-direction: column; padding: 20px 0; border-left: 1px solid #1a1a24; }
        .side-title { text-align: center; font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 20px; letter-spacing: 1px; }
        .ladder { display: flex; flex-direction: column-reverse; flex: 1; }
        .ladder-step { display: flex; padding: 6px 25px; font-size: 14px; font-weight: bold; color: #fff; }
        .ladder-step.milestone { color: var(--accent); }
        .ladder-step.active { background-color: var(--blue); color: #fff !important; }

        /* Модальное окно финала */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg-panel); padding: 40px; border-radius: 12px; text-align: center; max-width: 450px; border: 2px solid var(--accent); }
        .modal h2 { color: var(--accent); margin-bottom: 15px; }
        .modal p { font-size: 16px; margin-bottom: 25px; line-height: 1.5; }
        .modal .btn { display: inline-block; width: auto; padding: 12px 30px; }
    </style>
</head>
<body>

    <div class="main-panel">
        <div class="header">ПАHЕЛЬ ВЕДУЩЕГО</div>
        <div class="question-box" id="question">Загрузка вопроса...</div>
        
        <div class="options-grid">
            <div class="option" id="opt-0">A: </div>
            <div class="option" id="opt-1">B: </div>
            <div class="option" id="opt-2">C: </div>
            <div class="option" id="opt-3">D: </div>
        </div>

        <div>
            <div class="monitor-label">Игровой монитор (Реплики и действия игрока):</div>
            <div class="log-box" id="log"></div>
        </div>

        <div class="controls">
            <button class="btn btn-blue" id="btn-ask" onclick="playerThinks()">🎤 Озвучить вопрос игроку</button>
            <button class="btn btn-green" id="btn-confirm" onclick="confirmAnswer()" disabled>✅ Принять окончательный ответ</button>
        </div>
    </div>

    <div class="side-panel">
        <div class="side-title">ПРОГРЕСС ИГРЫ</div>
        <div class="ladder" id="ladder"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Игра окончена</h2>
            <p id="modal-text"></p>
            <button class="btn btn-blue" onclick="resetGame()">Начать заново</button>
        </div>
    </div>

    <script>
        const QUESTIONS = [
            {q: "Какая планета третья от Солнца?", a: ["Марс", "Венера", "Земля", "Меркурий"], correct: 2, level: 1},
            {q: "Сколько букв в русском алфавите?", a: ["32", "33", "34", "30"], correct: 1, level: 2},
            {q: "Что из этого НЕ является музыкальным инструментом?", a: ["Скрипка", "Флейта", "Тостер", "Барабан"], correct: 2, level: 3},
            {q: "Какое животное считается самым быстрым на суше?", a: ["Лев", "Гепард", "Заяц", "Страус"], correct: 1, level: 4},
            {q: "В каком городе находится Эйфелева башня?", a: ["Лондон", "Рим", "Берлин", "Париж"], correct: 3, level: 5},
            {q: "Какой химический элемент обозначается символом 'O'?", a: ["Золото", "Кислород", "Водород", "Железо"], correct: 1, level: 6},
            {q: "Кто написал роман 'Преступление и наказание'?", a: ["Толстой", "Чехов", "Достоевский", "Пушкин"], correct: 2, level: 7},
            {q: "Какая денежная единица используется в Японии?", a: ["Йена", "Юань", "Вона", "Доллар"], correct: 0, level: 8},
            {q: "Какое море является самым соленым на Земле?", a: ["Красное", "Средиземное", "Мёртвое", "Черное"], correct: 2, level: 9},
            {q: "В каком году произошел первый полет человека в космос?", a: ["1957", "1961", "1965", "1969"], correct: 1, level: 10},
            {q: "Какая самая длинная река в мире?", a: ["Амазонка", "Нил", "Янцзы", "Миссисипи"], correct: 0, level: 11},
            {q: "Какое государство является самым маленьким по площади?", a: ["Монако", "Мальта", "Ватикан", "Сан-Марино"], correct: 2, level: 12},
            {q: "Кто открыл закон всемирного тяготения?", a: ["Ньютон", "Эйнштейн", "Галилей", "Коперник"], correct: 0, level: 13},
            {q: "Сколько хромосом в здоровой соматической клетке человека?", a: ["23", "44", "46", "48"], correct: 2, level: 14},
            {q: "Какое культовое здание спроектировал архитектор Йорн Утзон?", a: ["Эмпайр-стейт-билдинг", "Сиднейский оперный театр", "Бурдж-Халифа", "Лувр"], correct: 1, level: 15}
        ];

        const MONEY_LADDER = ["0", "100", "200", "300", "500", "1 000", "2 000", "4 000", "8 000", "16 000", "32 000", "64 000", "125 000", "250 000", "500 000", "1 000 000"];
        const MILESTONES = [5, 10, 15];

        let currentStep = 0;
        let playerChoice = null;
        let lifelines = { "50:50": true, "Зал": true, "Звонок": true };
        let removedIndices = [];

        function initLadder() {
            const container = document.getElementById('ladder');
            container.innerHTML = '';
            for (let i = 1; i <= 15; i++) {
                const step = document.createElement('div');
                step.className = `ladder-step ${MILESTONES.includes(i) ? 'milestone' : ''}`;
                step.id = `step-${i}`;
                step.innerHTML = `<span>${String(i).padStart(2, '0')}&nbsp;&nbsp;♦&nbsp;&nbsp;${MONEY_LADDER[i]} руб</span>`;
                container.appendChild(step);
            }
        }

        function loadQuestion() {
            const q = QUESTIONS[currentStep];
            removedIndices = [];
            document.getElementById('question').innerText = `Вопрос №${currentStep + 1}:\n${q.q}`;
            
            const letters = ["A", "B", "C", "D"];
            for (let i = 0; i < 4; i++) {
                const opt = document.getElementById(`opt-${i}`);
                opt.innerText = `${letters[i]}: ${q.a[i]}`;
                opt.className = 'option';
            }

            for (let i = 1; i <= 15; i++) {
                const el = document.getElementById(`step-${i}`);
                el.classList.remove('active');
                if (i === currentStep + 1) el.classList.add('active');
            }

            document.getElementById('btn-ask').disabled = false;
            document.getElementById('btn-confirm').disabled = true;
            logWrite("Студия замерла. Озвучьте вопрос игроку, чтобы начать раунд...\n");
        }

        function logWrite(text) {
            const logBox = document.getElementById('log');
            logBox.innerText = text;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function playerThinks() {
            document.getElementById('btn-ask').disabled = true;
            const q = QUESTIONS[currentStep];
            const correctIdx = q.correct;
            const letters = ["A", "B", "C", "D"];
            
            let successChance = Math.max(95 - (q.level * 5), 25);
            let logText = `Игрок размышляет над вопросом на ${MONEY_LADDER[q.level]} руб...\n`;

            const availableLifelines = Object.keys(lifelines).filter(k => lifelines[k]);
            if (q.level > 4 && Math.random() < 0.45 && availableLifelines.length > 0) {
                const chosen = availableLifelines[Math.floor(Math.random() * availableLifelines.length)];
                lifelines[chosen] = false;

                if (chosen === "50:50") {
                    logText += `📢 Игрок: 'Господин ведущий, я сомневаюсь. Прошу убрать два неверных ответа (50:50).'\n`;
                    let wrong = [0,1,2,3].filter(i => i !== correctIdx);
                    wrong.sort(() => Math.random() - 0.5);
                    removedIndices = wrong.slice(0, 2);
                    removedIndices.forEach(idx => {
                        const opt = document.getElementById(`opt-${idx}`);
                        opt.innerText = `${letters[idx]}: [УДАЛЕНО]`;
                        opt.classList.add('removed');
                    });
                    successChance += 35;
                } else if (chosen === "Зал") {
                    logText += `📢 Игрок: 'Мне нужна подсказка трибун. Давайте спросим помощь зала.'\n`;
                    successChance += 20;
                } else if (chosen === "Звонок") {
                    logText += `📢 Игрок: 'Сложный вопрос. Я хочу использовать звонок другу.'\n`;
                    successChance += 25;
                }
            }

            if (Math.random() * 100 <= successChance) {
                playerChoice = correctIdx;
            } else {
                let allowedWrong = [0,1,2,3].filter(i => i !== correctIdx && !removedIndices.includes(i));
                playerChoice = allowedWrong.length > 0 ? allowedWrong[Math.floor(Math.random() * allowedWrong.length)] : correctIdx;
            }

            logText += `\n🎯 Выбор игрока: Вариант ${letters[playerChoice]}.\nИгрок: 'Это мой окончательный ответ, принимайте.'`;
            logWrite(logText);

            document.getElementById(`opt-${playerChoice}`).classList.add('selected');
            document.getElementById('btn-confirm').disabled = false;
        }

        function confirmAnswer() {
            const q = QUESTIONS[currentStep];
            const correctIdx = q.correct;
            const letters = ["A", "B", "C", "D"];

            if (playerChoice === correctIdx) {
                document.getElementById(`opt-${correctIdx}`).className = 'option correct';
                setTimeout(() => {
                    currentStep++;
                    if (currentStep === 15) {
                        showModal("ШОУ ЗАВЕРШЕНО!", `Великолепно! Игрок под твоим чутким руководством дошел до финала и выиграл ${MONEY_LADDER[15]} рублей! Вы потрясающий ведущий!`);
                    } else {
                        loadQuestion();
                    }
                }, 1200);
            } else {
                document.getElementById(`opt-${playerChoice}`).className = 'option wrong';
                document.getElementById(`opt-${correctIdx}`).className = 'option correct';
                
                let guaranteed = "0";
                if (currentStep >= 10) guaranteed = MONEY_LADDER[10];
                else if (currentStep >= 5) guaranteed = MONEY_LADDER[5];

                setTimeout(() => {
                    showModal("Игра окончена", `Увы, ваш игрок ошибся. Правильный ответ был: ${letters[correctIdx]}.\n\nВыигрыш составил несгораемую сумму: ${guaranteed} рублей.`);
                }, 1500);
            }
        }

        function showModal(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal').style.display = 'flex';
        }

        function resetGame() {
            currentStep = 0;
            lifelines = { "50:50": true, "Зал": true, "Звонок": true };
            document.getElementById('modal').style.display = 'none';
            loadQuestion();
        }

        // Старт
        initLadder();
        loadQuestion();
    </script>
</body>
</html>
